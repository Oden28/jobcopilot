version: "3.8"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jobcopilot-db
    environment:
      POSTGRES_DB: jobcopilot
      POSTGRES_USER: ${POSTGRES_USER:-jobcopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobcopilot_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobcopilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── App ─────────────────────────────────────────────────
  app:
    build: .
    container_name: jobcopilot-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jobcopilot}:${POSTGRES_PASSWORD:-jobcopilot_secret}@postgres:5432/jobcopilot
      - DATABASE_SSL=false
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-secret}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/applications/stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
