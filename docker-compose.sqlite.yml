version: "3.8"

# Lightweight single-container setup with SQLite (no external DB needed)
services:
  app:
    build: .
    container_name: jobcopilot
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-secret}
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

volumes:
  sqlite-data:
